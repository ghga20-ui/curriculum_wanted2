function buildAccordion() {
  const container = document.getElementById('subjectList');
  SECTIONS.forEach((section, idx) => {
    const acc = document.createElement('div');
    acc.className = 'accordion';

    const header = document.createElement('div');
    header.className = 'accordion-header';
    header.innerHTML = `
      <div class="acc-left">
        <span class="acc-icon">${section.icon}</span>
        <span class="acc-title">${section.title}</span>
        <span class="acc-count">${section.items.length}</span>
      </div>
      <span class="acc-arrow">▼</span>
    `;

    const body = document.createElement('div');
    body.className = 'accordion-body';

    section.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'subject-item';

      let tagsHtml = '';
      if (item.type) tagsHtml += `<span class="tag tag-${item.type}">${item.type}</span>`;
      tagsHtml += `<span class="tag tag-${item.src}">${item.src}</span>`;

      const descHtml = item.src === '고시외'
        ? `<div class="subject-desc none">— (고시외 과목)</div>`
        : (item.desc ? `<div class="subject-desc">${item.desc}</div>` : '');

      div.innerHTML = `
        <div class="subject-top">
          <span class="subject-name">${item.name}</span>
          <div class="tags">${tagsHtml}</div>
        </div>
        ${descHtml}
      `;
      body.appendChild(div);
    });

    header.addEventListener('click', () => {
      const isOpen = header.classList.contains('open');
      header.classList.toggle('open', !isOpen);
      body.classList.toggle('open', !isOpen);
    });

    acc.appendChild(header);
    acc.appendChild(body);
    container.appendChild(acc);
  });
}

buildAccordion();
